<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Self Photobooth Pro</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
}

.container{
  display:flex;
  flex-wrap:wrap;
  min-height:100vh;
}

.camera{
  flex:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
}

video{
  width:350px;
  border-radius:15px;
  border:4px solid white;
}

#countdown{
  font-size:80px;
  margin:15px;
}

#startButton{
  padding:15px 40px;
  font-size:20px;
  border:none;
  border-radius:15px;
  background:#ff4081;
  color:white;
  cursor:pointer;
  margin-top:15px;
  font-weight:bold;
}

#startButton:hover{
  opacity:0.9;
}

canvas{
  margin-top:20px;
  border-radius:15px;
  background:white;
}

.dashboard{
  flex:1;
  background:white;
  color:#333;
  padding:20px;
  overflow:auto;
}

.stat{
  background:#f0f0f0;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2a5298;
  color:white;
  cursor:pointer;
}

.gallery img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

@media(max-width:900px){
  .container{flex-direction:column;}
}
</style>
</head>
<body>

<div class="container">

<div class="camera">
  <h1>📸 Self Photobooth</h1>
  <video id="video" autoplay></video>
  <div id="countdown"></div>
  <button id="startButton">🎬 MULAI SESI</button>
  <canvas id="resultCanvas" width="350" height="900"></canvas>
</div>

<div class="dashboard">
  <h2>📊 Dashboard Report</h2>

  <div class="stat">Total Sesi: <span id="totalSession">0</span></div>
  <div class="stat">Total Foto Diambil: <span id="totalPhotos">0</span></div>
  <div class="stat">Terakhir Digunakan: <span id="lastUsed">-</span></div>

  <button onclick="exportData()">Export Data (JSON)</button>
  <button onclick="resetData()">Reset Data</button>

  <h3>Gallery Hasil</h3>
  <div class="gallery" id="gallery"></div>
</div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("resultCanvas");
const ctx = canvas.getContext("2d");
const countdownEl = document.getElementById("countdown");
const startButton = document.getElementById("startButton");

let historyData = JSON.parse(localStorage.getItem("photoboothData")) || [];
let totalPhotos = 0;
let sessionActive = false;

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => video.srcObject = stream);

function updateDashboard(){
  document.getElementById("totalSession").innerText = historyData.length;
  document.getElementById("totalPhotos").innerText = totalPhotos;
  document.getElementById("lastUsed").innerText =
    historyData.length ? historyData[historyData.length-1].date : "-";

  const gallery = document.getElementById("gallery");
  gallery.innerHTML="";
  historyData.slice().reverse().forEach(item=>{
    const img=document.createElement("img");
    img.src=item.image;
    gallery.appendChild(img);
  });
}

startButton.addEventListener("click",()=>{
  if(!sessionActive){
    sessionActive=true;
    startButton.style.display="none";
    startSession();
  }
});

function startSession(){
  let photos=[];
  let shots=3;
  let current=0;

  function takeShot(){
    let time=4;
    countdownEl.innerText=time;

    const interval=setInterval(()=>{
      time--;
      countdownEl.innerText=time;

      if(time<=0){
        clearInterval(interval);
        const tempCanvas=document.createElement("canvas");
        tempCanvas.width=350;
        tempCanvas.height=250;
        const tctx=tempCanvas.getContext("2d");
        tctx.drawImage(video,0,0,350,250);
        photos.push(tempCanvas);
        totalPhotos++;

        current++;
        if(current<shots){
          takeShot();
        }else{
          finishSession(photos);
        }
      }
    },1000);
  }

  takeShot();
}

function finishSession(photos){
  ctx.fillStyle="white";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let y=20;
  photos.forEach(p=>{
    ctx.drawImage(p,0,y,350,250);
    y+=280;
  });

  const imageData=canvas.toDataURL();

  historyData.push({
    date:new Date().toLocaleString(),
    image:imageData
  });

  localStorage.setItem("photoboothData",JSON.stringify(historyData));

  updateDashboard();

  countdownEl.innerText="Selesai!";
  sessionActive=false;
  startButton.style.display="block";
}

function exportData(){
  const dataStr = "data:text/json;charset=utf-8," +
    encodeURIComponent(JSON.stringify(historyData));
  const dl=document.createElement("a");
  dl.href=dataStr;
  dl.download="photobooth-report.json";
  dl.click();
}

function resetData(){
  localStorage.removeItem("photoboothData");
  historyData=[];
  totalPhotos=0;
  updateDashboard();
}

updateDashboard();
</script>

</body>
</html>
