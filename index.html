<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Event Photobooth Pro</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  text-align:center;
}
video{
  width:350px;
  border-radius:15px;
  border:4px solid white;
}
canvas{
  margin-top:15px;
  border-radius:15px;
  background:white;
}
input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:250px;
  margin-top:10px;
}
button{
  padding:12px 30px;
  border:none;
  border-radius:12px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
  background:#ff4081;
  color:white;
  font-weight:bold;
}
#adminPanel{
  display:none;
  background:white;
  color:#333;
  padding:20px;
  margin-top:20px;
}
.stat{
  background:#f0f0f0;
  padding:10px;
  margin:5px;
  border-radius:8px;
}
.gallery img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>
<body>

<h1>📸 Event Photobooth</h1>

<video id="video" autoplay></video>
<div id="countdown" style="font-size:70px;"></div>

<br>
<input type="text" id="username" placeholder="Masukkan Nama Peserta">
<br>
<button onclick="startSession()">🎬 Mulai Sesi</button>

<canvas id="resultCanvas" width="350" height="900"></canvas>

<br>
<button onclick="showAdminLogin()">🔐 Admin</button>

<div id="adminPanel">
<h2>📊 Dashboard Admin</h2>
<div class="stat">Total Sesi: <span id="totalSession">0</span></div>
<div class="stat">Total Foto: <span id="totalPhotos">0</span></div>
<div class="stat">Hari Ini: <span id="todayCount">0</span></div>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="resetData()">Reset Data</button>

<h3>Gallery</h3>
<div class="gallery" id="gallery"></div>
</div>

<script>
const ADMIN_PASSWORD="12345"; // ganti password di sini

const video=document.getElementById("video");
const canvas=document.getElementById("resultCanvas");
const ctx=canvas.getContext("2d");
const countdownEl=document.getElementById("countdown");

let historyData=JSON.parse(localStorage.getItem("eventData"))||[];
let totalPhotos=0;
let sessionNumber=historyData.length;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

function startSession(){
  const name=document.getElementById("username").value.trim();
  if(!name){ alert("Masukkan nama dulu"); return; }

  sessionNumber++;
  let photos=[];
  let shots=3;
  let current=0;

  function takeShot(){
    let time=4;
    countdownEl.innerText=time;

    const interval=setInterval(()=>{
      time--;
      countdownEl.innerText=time;
      if(time<=0){
        clearInterval(interval);
        const tempCanvas=document.createElement("canvas");
        tempCanvas.width=350;
        tempCanvas.height=250;
        const tctx=tempCanvas.getContext("2d");
        tctx.drawImage(video,0,0,350,250);
        photos.push(tempCanvas);
        totalPhotos++;
        current++;
        if(current<shots){
          takeShot();
        }else{
          finishSession(name,photos);
        }
      }
    },1000);
  }
  takeShot();
}

function finishSession(name,photos){
  ctx.fillStyle="white";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let y=20;
  photos.forEach(p=>{
    ctx.drawImage(p,0,y,350,250);
    y+=280;
  });

  ctx.fillStyle="black";
  ctx.font="20px Arial";
  ctx.fillText("Nama: "+name,20,880);
  ctx.fillText("Sesi: "+sessionNumber,20,860);

  const imageData=canvas.toDataURL();

  historyData.push({
    session:sessionNumber,
    name:name,
    date:new Date().toLocaleString(),
    image:imageData
  });

  localStorage.setItem("eventData",JSON.stringify(historyData));
  document.getElementById("username").value="";
  updateAdmin();
}

function showAdminLogin(){
  const pass=prompt("Masukkan Password Admin:");
  if(pass===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    updateAdmin();
  }else{
    alert("Password salah");
  }
}

function updateAdmin(){
  document.getElementById("totalSession").innerText=historyData.length;
  document.getElementById("totalPhotos").innerText=totalPhotos;

  const today=new Date().toLocaleDateString();
  const todayCount=historyData.filter(d=>
    new Date(d.date).toLocaleDateString()===today).length;

  document.getElementById("todayCount").innerText=todayCount;

  const gallery=document.getElementById("gallery");
  gallery.innerHTML="";
  historyData.slice().reverse().forEach(item=>{
    const img=document.createElement("img");
    img.src=item.image;
    gallery.appendChild(img);
  });
}

function exportCSV(){
  let csv="Session,Name,Date\n";
  historyData.forEach(d=>{
    csv+=`${d.session},${d.name},${d.date}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download="photobooth-report.csv";
  link.click();
}

function resetData(){
  if(confirm("Yakin reset semua data?")){
    localStorage.removeItem("eventData");
    historyData=[];
    totalPhotos=0;
    updateAdmin();
  }
}

updateAdmin();
</script>
</body>
</html>
