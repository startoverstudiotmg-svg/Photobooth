<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photobooth Modern</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  text-align:center;
  background:#f5f5f5;
}

h1{
  margin-top:10px;
}

#video{
  width:300px;
  border-radius:10px;
  border:3px solid #333;
}

#countdown{
  font-size:60px;
  font-weight:bold;
  color:red;
  height:70px;
}

button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#controls{
  margin:10px;
}

#stripCanvas{
  margin-top:20px;
  background:white;
  padding:10px;
  border-radius:10px;
}

input[type="color"]{
  height:40px;
  width:60px;
  border:none;
}

</style>
</head>
<body>

<h1>📸 Photobooth</h1>

<video id="video" autoplay></video>
<div id="countdown"></div>

<div id="controls">
  <button onclick="startPhotobooth()">Start</button>
  <button onclick="downloadStrip()">Download</button>
  <br>
  Background:
  <input type="color" id="bgColor" value="#ffffff">
  <br><br>
  Upload Frame:
  <input type="file" id="frameUpload" accept="image/*">
</div>

<canvas id="stripCanvas" width="300" height="900"></canvas>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('stripCanvas');
const ctx = canvas.getContext('2d');
const countdownEl = document.getElementById('countdown');
const bgColorPicker = document.getElementById('bgColor');
const frameUpload = document.getElementById('frameUpload');

let photos = [];
let frameImage = null;

navigator.mediaDevices.getUserMedia({ video:true })
.then(stream => video.srcObject = stream);

frameUpload.addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(event){
    frameImage = new Image();
    frameImage.src = event.target.result;
  }
  reader.readAsDataURL(e.target.files[0]);
});

function startPhotobooth(){
  photos = [];
  takePhotoSequence(3);
}

function takePhotoSequence(count){
  if(count === 0){
    createStrip();
    return;
  }

  let timeLeft = 4;
  countdownEl.innerText = timeLeft;

  const interval = setInterval(()=>{
    timeLeft--;
    countdownEl.innerText = timeLeft;

    if(timeLeft === 0){
      clearInterval(interval);
      capturePhoto();
      takePhotoSequence(count-1);
    }
  },1000);
}

function capturePhoto(){
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = 300;
  tempCanvas.height = 225;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(video,0,0,300,225);
  photos.push(tempCanvas);
}

function createStrip(){
  ctx.fillStyle = bgColorPicker.value;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let y = 20;
  photos.forEach(photo=>{
    ctx.drawImage(photo,0,y,300,225);
    y += 250;
  });

  if(frameImage){
    ctx.drawImage(frameImage,0,0,300,900);
  }

  countdownEl.innerText = "Done!";
}

function downloadStrip(){
  const link = document.createElement('a');
  link.download = "photostrip.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
